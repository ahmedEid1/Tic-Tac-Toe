name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between in-progress
# and the latest queued run. Don't cancel in-progress runs to let them finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (static export)
        env:
          NEXT_PUBLIC_BASE_PATH: /Tic-Tac-Toe
        run: npm run build

      - name: Add .nojekyll (preserve _next folder)
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enables Pages on first run if it isn't already on. (Requires
          # the repository to be public on free plans.)
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

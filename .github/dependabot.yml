version: 2
updates:
  # Keep npm dependencies fresh; group minor + patch into one PR per week.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep workflow actions fresh.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
